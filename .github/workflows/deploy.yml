name: Deploy Static Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, "${{ vars.RUNNER_LABEL }}"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev

      - name: Build
        run: npm run build
        env:
          VITE_APP_NAME: ${{ vars.APP_DISPLAY_NAME }}
          VITE_APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          VITE_BUGZERO_APP_KEY: ${{ vars.BUGZERO_APP_KEY }}
          VITE_BUGZERO_WIDGET_URL: ${{ vars.BUGZERO_WIDGET_URL }}

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
